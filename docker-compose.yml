version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: linkora-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: linkora-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory-policy', 'noeviction']
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: linkora-qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: linkora-backend
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
      - qdrant
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/linkora}
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: items
      QDRANT_VECTOR_SIZE: 1024
      AI_SERVICE_INTERNAL_KEY: ${AI_SERVICE_INTERNAL_KEY:-change-me-in-env}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      BACKEND_URL: http://localhost:3000
      FRONTEND_URL: http://localhost:5173

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: linkora-ai-service
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
      - qdrant
    ports:
      - '5001:5001'
    environment:
      PYTHONUNBUFFERED: 1
      PORT: 5001
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/linkora}
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: items
      QDRANT_VECTOR_SIZE: 1024
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_EMBEDDING_MODEL: mistral-embed
      MISTRAL_TEXT_MODEL: mistral-small-latest
      AI_SERVICE_INTERNAL_KEY: ${AI_SERVICE_INTERNAL_KEY:-change-me-in-env}

volumes:
  mongo_data:
  redis_data:
  qdrant_data:
