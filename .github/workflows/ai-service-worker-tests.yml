name: ai-service-worker-tests

on:
  push:
    paths:
      - ai-service/**
      - .github/workflows/ai-service-worker-tests.yml
  pull_request:
    paths:
      - ai-service/**
      - .github/workflows/ai-service-worker-tests.yml

jobs:
  test-ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    
    env:
      AI_SERVICE_INTERNAL_KEY: test-key-ci
      OPENAI_API_KEY: sk-test-ci
      MISTRAL_API_KEY: sk-test-ci
      MONGODB_URI: mongodb://localhost:27017/linkora-test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      QDRANT_URL: http://localhost:6333
      NODE_ENV: test

    services:
      mongodb:
        image: mongo:7
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\"" 
          --health-interval 10s 
          --health-timeout 5s 
          --health-retries 5
        ports:
          - 27017:27017

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'ai-service/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
