name: ai-service-worker-tests

on:
  push:
    paths:
      - ai-service/**
      - .github/workflows/ai-service-worker-tests.yml
  pull_request:
    paths:
      - ai-service/**
      - .github/workflows/ai-service-worker-tests.yml

jobs:
  test-ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'ai-service/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
